  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F8F6F2;
      --bg2: #F0EDE7;
      --text: #1C1A17;
      --text2: #6B6760;
      --text3: #9A9590;
      --gold: #B3A369;
      --gold-light: #E8E2CC;
      --border: #E4E0D8;
      --white: #FDFCFA;
      --radius: 10px;
      --max: 1080px;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    ::selection { background: var(--gold-light);
      color: var(--gold); }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(248,246,242,0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 24px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-name {
      font-weight: 600;
      font-size: 15px;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
    }
    .nav-links {
      display: flex;
      gap: 4px;
      list-style: none;
    }
    .nav-links a {
      font-size: 13px;
      color: var(--text2);
      text-decoration: none;
      padding: 5px 10px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      font-weight: 450;
    }
    .nav-links a:hover { color: var(--text); background: var(--bg2); }
    .nav-links a.active { color: var(--gold); font-weight: 500; }

    /* LAYOUT */
    main {
      max-width: var(--max);
      margin: 0 auto;
      padding: 80px 40px 80px;
    }

    /* FADE IN */
    .fade-in {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* SECTION */
    section { padding: 72px 0 0; }
    .section-label {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 24px;
      padding-top: 24px;
      border-top: 1.5px solid var(--border);
    }

    /* HERO */
    #hero {
      padding-top: 40px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 40px;
      align-items: center;
      min-height: calc(100vh - 80px);
    }
    .hero-text h1 {
      font-size: clamp(42px, 5vw, 64px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 10px;
    }
    .hero-text h2 {
      font-size: 19px;
      font-weight: 400;
      color: var(--text2);
      margin-bottom: 20px;
      letter-spacing: -0.01em;
    }
    .hero-text h2 span { color: var(--gold); font-weight: 500; }
    .hero-bio {
      font-size: 16px;
      color: var(--text2);
      max-width: 500px;
      line-height: 1.7;
      margin-bottom: 32px;
      text-wrap: pretty;
    }
    .hero-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
    .hero-contact {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .hero-contact-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text2);
      text-decoration: none;
      transition: color 0.15s;
    }
    .hero-contact-link:hover { color: var(--text); }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13.5px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.15s;
      cursor: pointer;
      border: none;
      font-family: inherit;
    }
    .btn-primary {
      background: var(--text);
      color: var(--white);
    }
    .btn-primary:hover { background: #2d2b28; transform: translateY(-1px); }
    .btn-secondary {
      background: var(--bg2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--border); transform: translateY(-1px); }
    .hero-photo {
      width: 340px;
      height: 340px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center top;
      border: 3px solid var(--border);
      flex-shrink: 0;
    }

    /* ABOUT */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .about-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }
    .about-card h3 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
      letter-spacing: -0.01em;
    }
    .about-card p {
      font-size: 14px;
      color: var(--text2);
      line-height: 1.7;
      text-wrap: pretty;
    }
    .about-card.full { grid-column: 1 / -1; }

    /* PROJECTS */
    .projects-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .project-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 28px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .project-card:hover {
      border-color: var(--gold);
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    }
    .project-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 8px;
    }
    .project-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    .project-org {
      font-size: 12px;
      font-weight: 500;
      color: var(--gold);
      background: var(--gold-light);
      padding: 3px 9px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .project-date {
      font-size: 12.5px;
      color: var(--text3);
      margin-bottom: 10px;
    }
    .project-desc {
      font-size: 14px;
      color: var(--text2);
      line-height: 1.65;
      margin-bottom: 14px;
      text-wrap: pretty;
    }
    .project-bullets {
      list-style: none;
      display: none;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }
    .project-bullets.open { display: flex; }
    .project-bullets li {
      font-size: 13.5px;
      color: var(--text2);
      line-height: 1.6;
      padding-left: 16px;
      position: relative;
      text-wrap: pretty;
    }
    .project-bullets li::before {
      content: '—';
      position: absolute;
      left: 0;
      color: var(--text3);
      font-size: 11px;
      top: 4px;
    }
    .project-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      font-size: 11.5px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 20px;
      background: var(--bg2);
      color: var(--text2);
      border: 1px solid var(--border);
    }
    .expand-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--text3);
      margin-top: 10px;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      padding: 0;
    }
    .expand-btn:hover { color: var(--text2); }

    /* ACHIEVEMENTS */
    .achievements-list { display: flex; flex-direction: column; gap: 12px; }
    .achievement-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
    }
    .achievement-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--gold-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .achievement-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }
    .achievement-desc {
      font-size: 13.5px;
      color: var(--text2);
      line-height: 1.6;
      text-wrap: pretty;
    }

    /* SKILLS */
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }
    .skill-group {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
    }
    .skill-group-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 12px;
    }
    .skill-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .skill-tag {
      font-size: 13px;
      font-weight: 450;
      padding: 5px 12px;
      border-radius: 20px;
      background: var(--bg2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    /* COURSEWORK */
    .coursework-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .course-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px;
    }
    .course-card-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 14px;
    }
    .course-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .course-list li {
      font-size: 14px;
      color: var(--text2);
      padding-left: 14px;
      position: relative;
    }
    .course-list li::before {
      content: '';
      position: absolute;
      left: 0; top: 8px;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0.6;
    }

    /* CONTACT */
    .contact-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .contact-link {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 13px 22px;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      transition: all 0.15s;
    }
    .contact-link:hover {
      border-color: var(--gold);
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      transform: translateY(-1px);
    }
    .contact-link svg { flex-shrink: 0; }

    /* TIMELINE */
    .timeline { display: flex; flex-direction: column; }
    .timeline-item {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 0 28px;
      position: relative;
      padding-bottom: 28px;
    }
    .timeline-item:last-child { padding-bottom: 0; }
    .timeline-left {
      text-align: right;
      padding-top: 2px;
    }
    .timeline-date {
      font-size: 12.5px;
      color: var(--text3);
      font-weight: 450;
      line-height: 1.5;
    }
    .timeline-right {
      position: relative;
      padding-left: 24px;
    }
    .timeline-right::before {
      content: '';
      position: absolute;
      left: 0; top: 8px;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--gold);
      flex-shrink: 0;
    }
    .timeline-right::after {
      content: '';
      position: absolute;
      left: 3px; top: 18px;
      width: 1px;
      bottom: -28px;
      background: var(--border);
    }
    .timeline-item:last-child .timeline-right::after { display: none; }
    .timeline-role {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .timeline-org {
      font-size: 13px;
      color: var(--text2);
      margin-top: 2px;
    }
    .timeline-desc {
      font-size: 13px;
      color: var(--text3);
      margin-top: 4px;
      line-height: 1.5;
    }
    .timeline-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--gold-light);
      color: var(--gold);
      margin-left: 8px;
      vertical-align: middle;
    }

    /* FOOTER */
    footer {
      max-width: var(--max);
      margin: 0 auto;
      padding: 48px 24px 32px;
      border-top: 1px solid var(--border);
      margin-top: 80px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    footer p { font-size: 13px; color: var(--text3); }

    /* PERSISTENT FOOTER BAR */
    .sticky-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 99;
      background: rgba(248,246,242,0.95);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--border);
      padding: 0 40px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }
    .sticky-bar a {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      color: var(--text2);
      text-decoration: none;
      font-weight: 450;
      transition: color 0.15s;
    }
    .sticky-bar a:hover { color: var(--text); }
    .sticky-bar .bar-divider { width: 1px; height: 16px; background: var(--border); }
    body { padding-bottom: 46px; }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      :root { --max: 100%; }
      main { padding: 80px 28px 80px; }
      .nav-inner { padding: 0 28px; }
      #hero { gap: 28px; }
      .hero-photo { width: 200px; height: 200px; }
      .projects-grid { grid-template-columns: 1fr; }
      .timeline-item { grid-template-columns: 130px 1fr; }
    }

    @media (max-width: 640px) {
      main { padding: 72px 18px 80px; }
      .nav-inner { padding: 0 18px; }
      .nav-links { display: none; }
      #hero {
        grid-template-columns: 1fr;
        min-height: unset;
        padding-top: 20px;
        gap: 20px;
      }
      .hero-photo { width: 100px; height: 100px; order: -1; }
      .hero-text h1 { font-size: 36px; }
      .hero-text h2 { font-size: 15px; }
      .hero-bio { font-size: 14px; }
      .about-grid, .skills-grid, .coursework-grid { grid-template-columns: 1fr; }
      .about-card.full { grid-column: 1; }
      .projects-grid { grid-template-columns: 1fr; }
      .timeline-item {
        grid-template-columns: 1fr;
        gap: 2px;
        padding-bottom: 24px;
      }
      .timeline-left { text-align: left; }
      .timeline-right::after { display: none; }
      .achievements-list .achievement-item { flex-direction: column; gap: 10px; }
      .contact-row { flex-direction: column; }
      .hero-actions { flex-direction: column; align-items: flex-start; }
      .hero-contact { gap: 14px; }
      .sticky-bar { gap: 16px; padding: 0 18px; font-size: 12px; }
      section { padding: 48px 0 0; }
      .footer { padding: 32px 18px; }
    }

    @media (min-width: 1400px) {
      :root { --max: 1180px; }
      .hero-photo { width: 380px; height: 380px; }
    }
  </style>
</head>

function useFadeIn(ref) {
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) { el.classList.add('visible'); obs.disconnect(); } },
      { threshold: 0.1 }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
}

function FadeSection({ id, children, style }) {
  const ref = useRef();
  useFadeIn(ref);
  return <section id={id} ref={ref} className="fade-in" style={style}>{children}</section>;
}

  );
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#b3a369",
  "bgColor": "#F8F6F2",
  "darkMode": false
}/*EDITMODE-END*/;

function TweaksPanel() {
  const [show, setShow] = useState(false);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);

  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setShow(true);
      if (e.data?.type === '__deactivate_edit_mode') setShow(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const update = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
    applyTweaks(next);
  };

  const applyTweaks = (t) => {
    document.documentElement.style.setProperty('--gold', t.accentColor);
    document.documentElement.style.setProperty('--bg', t.darkMode ? '#141210' : t.bgColor);
    document.documentElement.style.setProperty('--text', t.darkMode ? '#F0EDE7' : '#1C1A17');
    document.documentElement.style.setProperty('--text2', t.darkMode ? '#9A9590' : '#6B6760');
    document.documentElement.style.setProperty('--white', t.darkMode ? '#1E1C19' : '#FDFCFA');
    document.documentElement.style.setProperty('--border', t.darkMode ? '#2E2B26' : '#E4E0D8');
    document.documentElement.style.setProperty('--bg2', t.darkMode ? '#1C1A17' : '#F0EDE7');
    document.documentElement.style.setProperty('--gold-light', t.darkMode ? '#2a2618' : '#E8E2CC');
  };

  if (!show) return null;

  const panelStyle = {
    position: 'fixed', bottom: 24, right: 24, zIndex: 9999,
    background: '#FDFCFA', border: '1px solid #E4E0D8',
    borderRadius: 12, padding: '20px 22px', width: 240,
    boxShadow: '0 8px 32px rgba(0,0,0,0.12)',
    fontFamily: 'Inter, sans-serif',
  };

  return (
    <div style={panelStyle}>
      <div style={{fontSize: 12, fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase', color: '#9A9590', marginBottom: 16}}>Tweaks</div>

      <label style={{display: 'block', marginBottom: 14}}>
        <div style={{fontSize: 12, color: '#6B6760', marginBottom: 6}}>Accent color</div>
        <div style={{display: 'flex', gap: 8, alignItems: 'center'}}>
          <input type="color" value={tweaks.accentColor} onChange={e => update('accentColor', e.target.value)} style={{width: 36, height: 28, border: 'none', padding: 0, cursor: 'pointer', borderRadius: 4}} />
          <span style={{fontSize: 12, color: '#9A9590'}}>{tweaks.accentColor}</span>
        </div>
      </label>

      <label style={{display: 'block', marginBottom: 14}}>
        <div style={{fontSize: 12, color: '#6B6760', marginBottom: 6}}>Background</div>
        <div style={{display: 'flex', gap: 8, alignItems: 'center'}}>
          <input type="color" value={tweaks.bgColor} onChange={e => update('bgColor', e.target.value)} style={{width: 36, height: 28, border: 'none', padding: 0, cursor: 'pointer', borderRadius: 4}} />
          <span style={{fontSize: 12, color: '#9A9590'}}>{tweaks.bgColor}</span>
        </div>
      </label>

      <label style={{display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer'}}>
        <input type="checkbox" checked={tweaks.darkMode} onChange={e => update('darkMode', e.target.checked)} />
        <span style={{fontSize: 13, color: '#6B6760'}}>Dark mode</span>
      </label>
    </div>
  );
}
